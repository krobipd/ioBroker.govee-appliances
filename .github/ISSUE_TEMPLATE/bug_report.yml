name: Bug Report
description: Report a problem with the adapter
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Set adapter log level to "debug", reproduce the problem, paste the relevant lines
      render: text

  - type: input
    id: device
    attributes:
      label: Affected device (if applicable)
      placeholder: H7131

  - type: input
    id: adapter_version
    attributes:
      label: Adapter version
      placeholder: 0.0.1
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "20.11.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Debian 12 / Raspberry Pi OS
